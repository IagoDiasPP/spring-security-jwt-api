services:
  db:
    image: mysql:8
    container_name: analise-dados-db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_DATABASE: analise_dados
      MYSQL_USER: ${DATABASE_USERNAME}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}

    ports:
      - "3308:3306"

    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: